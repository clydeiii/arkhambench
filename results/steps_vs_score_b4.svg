<text x="290.4" y="90" font-size="11" fill="#555">score 2.80</text>
<text x="140" y="138" font-size="13" text-anchor="end" font-weight="bold">GPT-5.6 Terra</text>
<rect x="150" y="120" width="371.4" height="20" fill="#2f855a"/>
<text x="527.4" y="135" font-size="12" fill="#333">81 steps</text>
